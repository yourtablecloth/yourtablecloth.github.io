name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  workflow_dispatch:
  schedule:
    - cron: '30 15 * * 0'  # 매주 일요일 (스폰서 목록 갱신)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Generate Sponsors 💖
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: JamesIves/github-sponsors-readme-action@v1
        with:
          token: ${{ secrets.PAT }}
          organization: true
          file: 'docs/docs/sponsor.md'

      - name: Generate Sponsors JSON 📄
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT }}
          script: |
            const fs = require('fs');
            
            // GraphQL 쿼리로 스폰서 목록 가져오기
            const query = `
              query($org: String!) {
                organization(login: $org) {
                  sponsorshipsAsMaintainer(first: 100, includePrivate: false) {
                    totalCount
                    nodes {
                      createdAt
                      isActive
                      tier {
                        name
                        monthlyPriceInDollars
                        isOneTime
                      }
                      sponsorEntity {
                        ... on User {
                          login
                          name
                          avatarUrl
                          url
                        }
                        ... on Organization {
                          login
                          name
                          avatarUrl
                          url
                        }
                      }
                    }
                  }
                }
              }
            `;
            
            try {
              const result = await github.graphql(query, { org: 'yourtablecloth' });
              const sponsorships = result.organization.sponsorshipsAsMaintainer;
              
              const sponsors = sponsorships.nodes
                .filter(s => s.isActive && s.sponsorEntity)
                .map(s => ({
                  login: s.sponsorEntity.login,
                  name: s.sponsorEntity.name || s.sponsorEntity.login,
                  avatarUrl: s.sponsorEntity.avatarUrl,
                  profileUrl: s.sponsorEntity.url,
                  tier: s.tier ? {
                    name: s.tier.name,
                    monthlyPrice: s.tier.monthlyPriceInDollars,
                    isOneTime: s.tier.isOneTime
                  } : null,
                  since: s.createdAt
                }));
              
              const data = {
                generatedAt: new Date().toISOString(),
                totalCount: sponsors.length,
                sponsors: sponsors
              };
              
              // JSON 파일 저장
              fs.writeFileSync('docs/sponsors.json', JSON.stringify(data, null, 2));
              console.log(`Generated sponsors.json with ${sponsors.length} sponsors`);
            } catch (error) {
              console.log('No sponsors found or API error:', error.message);
              const data = {
                generatedAt: new Date().toISOString(),
                totalCount: 0,
                sponsors: []
              };
              fs.writeFileSync('docs/sponsors.json', JSON.stringify(data, null, 2));
            }

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
